language: en-US
reviews:
  profile: assertive
  path_instructions:
    - path: "**/*.py"
      instructions: |
        Check for:
        - PII/secrets accidentally left in code
        - Missing input validation on user-facing functions
        - Token budget awareness in LLM-calling code
        - Loop detection patterns in agent code
    - path: "qutato_devkit/**"
      instructions: |
        This is the Qutato DevKit trust layer. Ensure:
        - All trust checks are comprehensive
        - PII patterns cover common formats
        - Budget calculations are accurate
        - Memory operations are atomic
  auto_review:
    enabled: true
    drafts: false
chat:
  auto_reply: true
